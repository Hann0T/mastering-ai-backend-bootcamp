name: DocuChat CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run migrations
        env:
          DATABASE_URL: file:${{ github.workspace }}/test.db
        run: npx prisma migrate deploy

      - name: Run tests
        env:
          DATABASE_URL: file:${{ github.workspace }}/test.db
          JWT_ACCESS_SECRET: b50f17672f6b36f552560952ecdfe340e0ec090f73fdb5eb2121a54831eb1827
          JWT_REFRESH_SECRET: 8a5d94c409b2f647ed9a8fed72b7c5d8e4cbbfdcd5f0c19452311e899be961de
          NODE_ENV: test
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
